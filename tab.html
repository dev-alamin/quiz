<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs + URL Sync</title>

    <link rel="stylesheet" href="tab/tab.css">
</head>
<body>
    <div id="root">
        <h1>Tabs + URL Sync</h1>

        <div class="tabs">
            <div class="tab-list" role="tablist" aria-label="Project sections">
                <button type="button" class="tab" role="tab" id="tab-overview"
                        aria-selected="true" aria-controls="panel-overview" data-tab="overview">
                    Overview
                </button>
                <button type="button" class="tab" role="tab" id="tab-specs"
                        aria-selected="false" aria-controls="panel-specs" data-tab="specs" tabindex="-1">
                    Specs
                </button>
                <button type="button" class="tab" role="tab" id="tab-reviews"
                        aria-selected="false" aria-controls="panel-reviews" data-tab="reviews" tabindex="-1">
                    Reviews
                </button>
                <button type="button" class="tab" role="tab" id="tab-support"
                        aria-selected="false" aria-controls="panel-support" data-tab="support" tabindex="-1">
                    Support
                </button>
            </div>

            <div class="tab-panel" role="tabpanel" id="panel-overview" aria-labelledby="tab-overview">
                <h2>Overview</h2>
                <p>High-level summary content goes here.</p>
            </div>
            <div class="tab-panel" role="tabpanel" id="panel-specs" aria-labelledby="tab-specs" hidden>
                <h2>Specs</h2>
                <p>Technical specifications go here.</p>
            </div>
            <div class="tab-panel" role="tabpanel" id="panel-reviews" aria-labelledby="tab-reviews" hidden>
                <h2>Reviews</h2>
                <p>Customer reviews go here.</p>
            </div>
            <div class="tab-panel" role="tabpanel" id="panel-support" aria-labelledby="tab-support" hidden>
                <h2>Support</h2>
                <p>Support and FAQ content goes here.</p>
            </div>
        </div>
    </div>

    <script type="module" src="tab/tab.js"></script>
</body>
</html>
